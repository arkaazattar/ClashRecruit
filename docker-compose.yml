services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    working_dir: /app
    command: gunicorn --bind 0.0.0.0:5000 --workers 2 --threads 4 --timeout 120 ClashRecruit.app:app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      CELERY_BROKER_URL: redis://redis:6379/0
    expose:
      - "5000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - web
    restart: unless-stopped

  worker:
    build: .
    working_dir: /app
    command: celery -A ClashRecruit.services.celery_app:app worker --loglevel=info
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build: .
    working_dir: /app
    command: celery -A ClashRecruit.services.celery_app:app beat --loglevel=info
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
